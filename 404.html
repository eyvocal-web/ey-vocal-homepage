<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>페이지를 찾을 수 없습니다 | EY보컬스튜디오</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/app.min.css">
  <link rel="icon" type="image/png" href="assets/brand/logo-icon-black.png">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-page__content {
      width: min(100%, 42rem);
      padding: var(--space-12);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-panel);
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .error-page__logo {
      width: min(14rem, 52vw);
      height: auto;
      margin: 0 auto var(--space-8);
    }

    .error-page__actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      align-items: center;
      margin-top: var(--space-8);
    }

    .error-page__caption {
      margin-top: var(--space-6);
      font-size: var(--text-small);
      color: var(--color-white-60);
      line-height: var(--leading-relaxed);
    }

    @media (min-width: 640px) {
      .error-page__actions {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">본문 바로가기</a>

  <main id="main" class="section section--dark error-page">
    <div class="container">
      <div class="error-page__content">
        <img src="assets/brand/logo-horizontal-white.png" alt="EY보컬스튜디오" class="error-page__logo" width="400" height="400">
        <span class="section__label">404</span>
        <h1 class="section__title">찾으시는 페이지를 바로 열어 드리지 못했습니다</h1>
        <p class="section__subtitle text-center">
          주소가 바뀌었거나 연결이 끊어진 페이지일 수 있습니다.
          아래 버튼으로 홈으로 돌아가시거나, 카카오톡 상담에서 바로 안내받으실 수 있습니다.
        </p>

        <div class="error-page__actions">
          <a href="/" class="btn btn--primary">홈으로 돌아가기</a>
          <a href="https://open.kakao.com/o/seso1YLg" class="btn btn--secondary" target="_blank" rel="noopener noreferrer">카카오톡 상담하기</a>
        </div>

        <p class="error-page__caption">
          레슨 문의와 위치 안내는 홈 화면 하단에서도 바로 확인하실 수 있습니다.
        </p>
      </div>
    </div>
  </main>
</body>
</html>
